site_name: MCBBBS 玩家百科
site_description: MCBBBS 粘液生存服务器玩家手册与粘液科技扩展玩法指南
site_url: https://bbbs.yunci.net/
repo_url: https://github.com/dac114514/mcbbbs-docs
repo_name: dac114514/mcbbbs-docs

nav:
  - 玩家手册: index.md
  - 粘液科技: slimefun.md
  - 回收商店价目表: recycle-prices.md
  - 更新日志: updates.md
  - 粘液科技扩展: slimefun-addons.md

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.footer
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

copyright: MCBBBS官方WIKI · [官方群：697112487](mqqapi://card/show_pslcard?src_type=internal&version=1&uin=697112487&card_type=group&source=qrcode)
